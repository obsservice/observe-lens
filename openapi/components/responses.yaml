BadRequest:
  description: Invalid request.
  content: { application/json: { schema: { $ref: ../schemas/common.yaml#/ErrorResponse } } }
Unauthorized:
  description: Authentication failed or is required.
  content: { application/json: { schema: { $ref: ../schemas/common.yaml#/ErrorResponse } } }
