###########################################################
# Common Query Parameters
###########################################################

Page:
  name: page
  in: query
  description: Page number.
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1

PageSize:
  name: page_size
  in: query
  description: Number of items per page.
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20

Keyword:
  name: keyword
  in: query
  description: Search keyword.
  required: false
  schema:
    type: string

SortBy:
  name: sort_by
  in: query
  description: Sort field.
  required: false
  schema:
    type: string

Order:
  name: order
  in: query
  description: Sort order.
  required: false
  schema:
    type: string
    enum:
      - asc
      - desc
    default: desc

