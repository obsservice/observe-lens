files:
  get:
    tags: [Knowledge]
    summary: List knowledge files
    operationId: listKnowledgeFiles
    parameters: [{ $ref: ../components/parameters.yaml#/Page }, { $ref: ../components/parameters.yaml#/PageSize }, { $ref: ../components/parameters.yaml#/Keyword }, { name: file_type, in: query, schema: { type: string } }]
    responses: { '200': { description: Knowledge files, content: { application/json: { schema: { $ref: ../schemas/knowledge.yaml#/KnowledgeFilePage } } } } }
  post:
    tags: [Knowledge]
    summary: Upload knowledge file
    operationId: uploadKnowledgeFile
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties: { file: { type: string, format: binary } }
    responses: { '201': { description: Uploaded and queued for indexing, content: { application/json: { schema: { $ref: ../schemas/knowledge.yaml#/KnowledgeFile } } } } }
file:
  get:
    tags: [Knowledge]
    summary: Get knowledge file metadata
    operationId: getKnowledgeFile
    parameters: [{ $ref: ../components/parameters.yaml#/FileId }]
    responses: { '200': { description: File metadata, content: { application/json: { schema: { $ref: ../schemas/knowledge.yaml#/KnowledgeFile } } } } }
  delete:
    tags: [Knowledge]
    summary: Delete knowledge file
    operationId: deleteKnowledgeFile
    parameters: [{ $ref: ../components/parameters.yaml#/FileId }]
    responses: { '204': { description: Deleted } }
status:
  get:
    tags: [Knowledge]
    summary: Get file indexing status
    operationId: getKnowledgeFileStatus
    parameters: [{ $ref: ../components/parameters.yaml#/FileId }]
    responses: { '200': { description: Index status, content: { application/json: { schema: { $ref: ../schemas/knowledge.yaml#/KnowledgeFileStatus } } } } }
reindex:
  post:
    tags: [Knowledge]
    summary: Reindex knowledge file
    operationId: reindexKnowledgeFile
    parameters: [{ $ref: ../components/parameters.yaml#/FileId }]
    responses: { '202': { description: Reindex queued, content: { application/json: { schema: { $ref: ../schemas/knowledge.yaml#/KnowledgeFileStatus } } } } }
fileTypes:
  get: { tags: [Knowledge], summary: List supported file types, operationId: listKnowledgeFileTypes, responses: { '200': { description: File types, content: { application/json: { schema: { type: array, items: { $ref: ../schemas/common.yaml#/Option } } } } } } }
indexStatuses:
  get: { tags: [Knowledge], summary: List index statuses, operationId: listKnowledgeIndexStatuses, responses: { '200': { description: Index statuses, content: { application/json: { schema: { type: array, items: { $ref: ../schemas/common.yaml#/Option } } } } } } }
