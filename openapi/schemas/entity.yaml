Entity:
  type: object
  required: [id, name, type, namespace, status, updated_at]
  properties:
    id: { $ref: common.yaml#/UUID }
    name: { type: string }
    type: { type: string }
    namespace: { type: string }
    status: { type: string }
    labels: { type: object, additionalProperties: { type: string } }
    metadata: { type: object, additionalProperties: true }
    updated_at: { $ref: common.yaml#/Timestamp }
EntityPage:
  allOf: [{ $ref: common.yaml#/PagedResult }, { type: object, properties: { items: { type: array, items: { $ref: '#/Entity' } } } }]
EntityRelation:
  type: object
  required: [id, source_entity_id, target_entity_id, type]
  properties:
    id: { $ref: common.yaml#/UUID }
    source_entity_id: { $ref: common.yaml#/UUID }
    target_entity_id: { $ref: common.yaml#/UUID }
    type: { type: string }
    metadata: { type: object, additionalProperties: true }
Topology:
  type: object
  required: [nodes, edges]
  properties:
    nodes: { type: array, items: { $ref: '#/Entity' } }
    edges: { type: array, items: { $ref: '#/EntityRelation' } }
OpenConversationResponse:
  type: object
  required: [conversation_id]
  properties:
    conversation_id: { $ref: common.yaml#/UUID }
