RunStatus: { type: string, enum: [pending, running, completed, failed, cancelled] }
StepStatus: { type: string, enum: [pending, running, completed, failed, skipped] }
EventType:
  type: string
  enum: [run.started, run.progress, run.completed, run.failed, run.cancelled, analysis.generated, plan.generated, step.started, step.progress, step.completed, step.failed, step.skipped, toolcall.started, toolcall.progress, toolcall.completed, toolcall.failed, observation.generated, finding.generated, output.started, output.progress, output.completed]
Run:
  type: object
  required: [id, conversation_id, status, created_at]
  properties:
    id: { $ref: common.yaml#/UUID }
    conversation_id: { $ref: common.yaml#/UUID }
    message_id: { $ref: common.yaml#/UUID }
    status: { $ref: '#/RunStatus' }
    agent_type: { type: string }
    started_at: { $ref: common.yaml#/Timestamp }
    completed_at: { $ref: common.yaml#/Timestamp, nullable: true }
    error_code: { type: string, nullable: true }
    error_message: { type: string, nullable: true }
    created_at: { $ref: common.yaml#/Timestamp }
RunStep:
  type: object
  required: [id, run_id, sequence, title, status]
  properties:
    id: { type: string }
    run_id: { $ref: common.yaml#/UUID }
    sequence: { type: integer, minimum: 1 }
    title: { type: string }
    status: { $ref: '#/StepStatus' }
    summary: { type: string, nullable: true }
    started_at: { $ref: common.yaml#/Timestamp, nullable: true }
    completed_at: { $ref: common.yaml#/Timestamp, nullable: true }
AESPEvent:
  type: object
  description: Agent Execution Stream Protocol event envelope.
  required: [id, type, timestamp, conversation_id, run_id, sequence, data]
  properties:
    id: { type: string, description: Globally unique event ID }
    type: { $ref: '#/EventType' }
    timestamp: { $ref: common.yaml#/Timestamp }
    conversation_id: { $ref: common.yaml#/UUID }
    run_id: { $ref: common.yaml#/UUID }
    sequence: { type: integer, minimum: 1 }
    parent_id: { type: string, nullable: true }
    metadata: { type: object, additionalProperties: true }
    data: { type: object, additionalProperties: true }
Observation:
  type: object
  required: [id, run_id, observation_type, title]
  properties:
    id: { type: string }
    run_id: { $ref: common.yaml#/UUID }
    step_id: { type: string }
    observation_type: { type: string, enum: [markdown, string, json, yaml, chart, table, log, trace, topology, dashboard, code, image, file] }
    title: { type: string }
    summary: { type: string }
    content: { type: object, additionalProperties: true }
    result_ref: { type: object, additionalProperties: true }
    created_at: { $ref: common.yaml#/Timestamp }
Artifact:
  type: object
  required: [id, run_id, name, type]
  properties:
    id: { $ref: common.yaml#/UUID }
    run_id: { $ref: common.yaml#/UUID }
    name: { type: string }
    type: { type: string }
    url: { type: string, format: uri }
    created_at: { $ref: common.yaml#/Timestamp }
RcaResult:
  type: object
  required: [run_id, summary, findings]
  properties:
    run_id: { $ref: common.yaml#/UUID }
    root_cause: { type: string }
    summary: { type: string }
    recommendations: { type: array, items: { type: string } }
    findings: { type: array, items: { type: object, additionalProperties: true } }
