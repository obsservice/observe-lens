LoginRequest:
  type: object
  required: [username, password]
  properties:
    username: { type: string, minLength: 1 }
    password: { type: string, format: password, minLength: 1 }

TokenPair:
  type: object
  required: [access_token, refresh_token, token_type, expires_in]
  properties:
    access_token: { type: string }
    refresh_token: { type: string }
    token_type: { type: string, enum: [Bearer], example: Bearer }
    expires_in: { type: integer, minimum: 1, description: Access token lifetime in seconds }

RefreshTokenRequest:
  type: object
  required: [refresh_token]
  properties:
    refresh_token: { type: string }

CurrentUser:
  type: object
  required: [id, username, display_name, roles]
  properties:
    id: { $ref: common.yaml#/UUID }
    username: { type: string }
    display_name: { type: string }
    email: { type: string, format: email }
    roles:
      type: array
      items: { type: string }
